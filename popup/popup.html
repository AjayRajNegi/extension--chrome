<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Black Screen</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 240px;
        background: #0f0f0f;
        color: #e0e0e0;
        font-family: "Google Sans", Roboto, sans-serif;
        padding: 20px 18px 18px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff0000;
        flex-shrink: 0;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.02em;
      }

      .desc {
        font-size: 12px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 18px;
      }

      .divider {
        border: none;
        border-top: 1px solid #222;
        margin-bottom: 16px;
      }

      .control-label {
        font-size: 11px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      .control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 6px 8px;
        margin-bottom: 16px;
      }

      .ctrl-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #222;
        color: #ccc;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
        user-select: none;
      }

      .ctrl-btn:hover {
        background: #2e2e2e;
        border-color: #555;
        color: #fff;
      }
      .ctrl-btn:active {
        background: #111;
      }
      .ctrl-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .value-display {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .value-number {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
      }

      .value-unit {
        font-size: 10px;
        color: #555;
        letter-spacing: 0.05em;
      }

      .footer {
        font-size: 10px;
        color: #333;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="dot"></div>
      <span class="title">YouTube Black Screen</span>
    </div>

    <p class="desc">
      Hides the YouTube home feed behind a black screen until you choose to
      reveal it.
    </p>

    <hr class="divider" />

    <p class="control-label">Screen Height</p>

    <div class="control-row">
      <button class="ctrl-btn" id="btn-dec">−</button>
      <div class="value-display">
        <span class="value-number" id="height-val">100</span>
        <span class="value-unit">VH</span>
      </div>
      <button class="ctrl-btn" id="btn-inc">+</button>
    </div>

    <p class="footer">Changes apply instantly on the active tab</p>
    <script src="popup.js"></script>
  </body>
</html>
