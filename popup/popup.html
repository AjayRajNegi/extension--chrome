<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Black Screen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Google Sans', Roboto, sans-serif;
      padding: 20px 18px 18px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff0000;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .desc {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin-bottom: 14px;
    }

    .footer {
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <span class="title">YouTube Black Screen</span>
  </div>

  <p class="desc">
    A black screen is inserted at the top of the YouTube home feed, hiding video recommendations until you choose to see them.
  </p>

  <hr class="divider"/>

  <p class="footer">Reload YouTube tab to apply changes</p>
</body>
</html>
